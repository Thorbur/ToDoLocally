<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">ToDoLocally Logo</title>
  <desc id="logoDesc">Three task columns with cards inside them.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#16a085"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="216" height="216" rx="46" fill="url(#bgGrad)"/>

  <!-- Three boxes/columns -->
  <rect x="42" y="64" width="52" height="132" rx="10" fill="#f6fbff" fill-opacity="0.94"/>
  <rect x="102" y="64" width="52" height="132" rx="10" fill="#f6fbff" fill-opacity="0.94"/>
  <rect x="162" y="64" width="52" height="132" rx="10" fill="#f6fbff" fill-opacity="0.94"/>

  <!-- Cards inside left column -->
  <rect x="48" y="74" width="40" height="24" rx="6" fill="url(#cardGrad)" stroke="#8ab5ff" stroke-width="2"/>
  <rect x="48" y="104" width="40" height="24" rx="6" fill="url(#cardGrad)" stroke="#8ab5ff" stroke-width="2"/>

  <!-- Cards inside middle column -->
  <rect x="108" y="74" width="40" height="24" rx="6" fill="url(#cardGrad)" stroke="#7cc9b8" stroke-width="2"/>
  <rect x="108" y="104" width="40" height="24" rx="6" fill="url(#cardGrad)" stroke="#7cc9b8" stroke-width="2"/>
  <rect x="108" y="134" width="40" height="24" rx="6" fill="url(#cardGrad)" stroke="#7cc9b8" stroke-width="2"/>

  <!-- Cards inside right column -->
  <rect x="168" y="74" width="40" height="24" rx="6" fill="url(#cardGrad)" stroke="#a6a3ff" stroke-width="2"/>
  <rect x="168" y="104" width="40" height="24" rx="6" fill="url(#cardGrad)" stroke="#a6a3ff" stroke-width="2"/>

  <!-- Minimal check mark accent below the columns -->
  <path d="M114 213l8 8 19-20" fill="none" stroke="#2bd47f" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
