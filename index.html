<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>ToDoLocally</title>
    <link rel="icon" type="image/svg+xml" href="imgs/logo.svg">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/bootup.js"></script>
    <script src="js/nearley.js"></script>
    <script src="js/grammar.js"></script>
</head>
<body>

<div id="menuSidenav" class="sidenav">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <a id="menu-export-link" href="javascript:void(0)" onclick="exportData()">Export</a>
    <a id="menu-import-link" href="javascript:void(0)" onclick="importData()">Import</a>
    <a id="menu-restore-link" href="javascript:void(0)" onclick="restoreBackup()">Restore backup</a>
    <input id="import-file" type="file" onchange="processFile(this.files)">
    <a id="menu-settings-link" href="javascript:void(0)" onclick="toggleSettingsPanel()">Settings</a>
    <div id="settings-panel" class="settings-panel hidden">
        <label id="settings-language-label" for="language-select">Language</label>
        <select id="language-select" onchange="changeLanguage(this.value)">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="zh">中文</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="it">Italiano</option>
            <option value="ar">العربية</option>
            <option value="fa">فارسی</option>
            <option value="pt">Português</option>
            <option value="hi">हिन्दी</option>
            <option value="uk">Українська</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
        </select>
        <label id="settings-theme-label" for="theme-select">Theme</label>
        <select id="theme-select" onchange="changeTheme(this.value)">
            <option id="theme-option-default" value="default">Default</option>
            <option id="theme-option-dark" value="dark">Dark mode</option>
            <option id="theme-option-high-contrast" value="high-contrast">High contrast</option>
            <option id="theme-option-ocean" value="ocean">Ocean</option>
            <option id="theme-option-sepia" value="sepia">Sepia</option>
        </select>
    </div>
</div>

<header>
    <div>
        <span style="font-size:30px;cursor:pointer" onclick="openNav()">&#9776; <span id="menu-toggle-label">Menu</span></span>
        <div class="app-brand">
            <img id="app-logo" src="imgs/logo.svg" alt="ToDoLocally logo">
            <h1 id="app-title">ToDoLocally</h1>
        </div>
    </div>
</header>

<form id="addNew" class="hidden" data-mode="add">
    <div>
        <input type="hidden" name="key" id="key" value="">
        <input type="hidden" name="sort_order" id="sort_order" value="">
        <input type="hidden" name="old_stage" id="old_stage" value="">
        <label id="label-task" for="task">Summary *</label>
        <input type="text" name="task" id="task" value="" required>
    </div>
    <div>
        <span id="stage-label">Task stage</span>
        <p id="stage-display"></p>
        <label id="label-status" for="status">Done</label>
        <input type="checkbox" id="status" name="status" value="">
        <input type="hidden" name="resolved" id="resolved" value="">
        <label id="label-display" for="display">Hidden</label>
        <input type="checkbox" id="display" name="display" value="">
    </div>
    <div>
        <label id="label-due" for="due">Due date</label>
        <input type="date" id="due" name="due" value="">
    </div>

    <div>
        <label id="label-priority" for="priority">Priority</label>
        <select id="priority" name="priority">
            <option id="priority-option-0" value="0">None</option>
            <option id="priority-option-1" value="1">Low</option>
            <option id="priority-option-2" value="2">Medium</option>
            <option id="priority-option-3" value="3">High</option>
        </select>
    </div>

    <div>
        <label id="label-ticket-needed" for="ticket_needed">Ticket needed</label>
        <input type="checkbox" id="ticket_needed" name="ticket_needed" value="">
    </div>

    <div>
        <label id="label-ticket-reference" for="ticket_reference">Ticket reference</label>
        <input type="text" id="ticket_reference" name="ticket_reference" value="">
    </div>

    <div>
        <label id="label-notes" for="notes">Notes</label>
        <textarea id="notes" name="notes" cols="30" rows="3"></textarea>
        <div>
            <button type="button" class="submit" id="save-button">Save</button>
            <button type="button" id="delete-button">Delete</button>
            <button type="button" id="cancel-button" onclick="hideNewForm()">Cancel</button>
        </div>
    </div>
</form>
<br>
<br>
<section id="tasklist">
    <div id="search" class="search-form">
        <label for="find"></label><input type="search" id="find" name="find"/>
        <button type="button" id="search-help-button" title="?" aria-label="Search help" onclick="openSearchHelp()">?</button>
        <button type="button" class="submit" id="search-button">Search</button>
    </div>
    <div id="search-help-modal" class="search-help-modal hidden" role="dialog" aria-modal="true" aria-labelledby="search-help-title">
        <div class="search-help-dialog">
            <div class="search-help-header">
                <h2 id="search-help-title">Search Help</h2>
                <button type="button" id="search-help-close" class="search-help-close" onclick="closeSearchHelp()" aria-label="Close">x</button>
            </div>
            <div id="search-help-content" class="search-help-content"></div>
        </div>
    </div>
    <br>
    <button id="back-button" class="hidden">Back to task view</button>
    <div id="list">
        <table id="task-table">
            <thead>
            <tr>
                <th>
                    <button class="add-button" type="button" id="showadd-current"
                            onclick="showNewForm('current', false)">+
                    </button>
                    <span id="column-current">Current tasks</span>
                </th>
                <th>
                    <button class="add-button" type="button" id="showadd-ongoing"
                            onclick="showNewForm('ongoing', false)">+
                    </button>
                    <span id="column-ongoing">Ongoing</span>
                </th>
                <th>
                    <button class="add-button" type="button" id="showadd-backlog"
                            onclick="showNewForm('backlog', false)">+
                    </button>
                    <span id="column-backlog">Backlog</span>
                </th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>
                    <div class="task-area" id="current-tasks"></div>
                </td>
                <td>
                    <div class="task-area" id="ongoing-tasks"></div>
                </td>
                <td>
                    <div class="task-area" id="backlog-tasks"></div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>

<footer>
</footer>
<script type="text/javascript" src="js/utils.js"></script>
<script type="text/javascript" src="js/todolist.js"></script>
</body>
</html>
